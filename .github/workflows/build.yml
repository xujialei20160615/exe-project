# 工作流的名称
name: Build and Release Executable

# 触发方式：允许你从 GitHub Actions 页面手动运行
on:
  workflow_dispatch:

# 任务定义
jobs:
  build:
    # 关键点：指定使用 Windows 虚拟机[reference:5][reference:6]
    runs-on: windows-latest

    steps:
      # 1. 拉取你的代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境[reference:7]
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 建议指定一个具体版本

      # 3. 安装项目依赖[reference:8]
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # 确保 requirements.txt 包含 pyinstaller

      # 4. 执行打包[reference:9][reference:10]
      - name: Build executable with PyInstaller
        run: |
          pyinstaller -F --collect-all shapely wkb_tool.py # 替换为你的主文件名

      # 5. 上传打包结果 (Artifact)[reference:11]
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: wkb_tool-windows
          path: dist/wkb_tool.exe # 替换为你的输出文件名
